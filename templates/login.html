{% extends 'base.html' %}
{% block content %}
<section class="card narrow">
  <h1>Ingresar</h1>
  <form method="post" class="form-grid">
    <label>Usuario
      <input type="text" name="username" required>
    </label>
    <label>Contraseña
      <input type="password" name="password" required>
    </label>
    <button type="submit">Entrar</button>
  </form>
</section>

{% endblock %}
